spring:
  application:
    name: order-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${spring.application.name}-group
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      # enable-auto-commit: false

      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.ecommerce.order.entrypoint.messaging.event"
        spring.json.type.mapping: >
          productCreated: com.ecommerce.order.entrypoint.messaging.event.product.ProductCreatedEvent,
          productUpdated: com.ecommerce.order.entrypoint.messaging.event.product.ProductUpdatedEvent,
          productDeleted: com.ecommerce.order.entrypoint.messaging.event.product.ProductDeletedEvent,
          paymentProcessed: com.ecommerce.order.entrypoint.messaging.event.payment.PaymentProcessedEvent

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.type.mapping: >
          orderCreated: com.ecommerce.order.infrastructure.messaging.event.OrderCreatedEvent

app:
  kafka:
    topics:
      product:
        created: product-created-topic
        updated: product-updated-topic
        deleted: product-deleted-topic
      order:
        created: order-created-topic
      payment:
        payment-processed: payment-processed-topic

server:
  port: ${SERVER_PORT:8080}